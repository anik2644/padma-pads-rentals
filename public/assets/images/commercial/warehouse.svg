<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="180" cy="160" r="360" fill="white" opacity="0.06"/>
  <circle cx="1050" cy="740" r="310" fill="white" opacity="0.06"/>
  <!-- Industrial warehouse -->
  <g fill="white" opacity="0.18" transform="translate(600,460)">
    <!-- Main shed body -->
    <rect x="-400" y="-180" width="800" height="270" rx="4"/>
    <!-- Arched / sawtooth roof -->
    <path d="M-400,-180 Q-300,-320 -200,-180 Q-100,-320 0,-180 Q100,-320 200,-180 Q300,-320 400,-180" fill="none" stroke="white" stroke-width="22" opacity="0.7"/>
    <!-- Large roller doors -->
    <rect x="-370" y="-100" width="140" height="185" opacity="0.5" rx="3"/>
    <rect x="-200" y="-100" width="140" height="185" opacity="0.5" rx="3"/>
    <rect x="60"   y="-100" width="140" height="185" opacity="0.5" rx="3"/>
    <rect x="230"  y="-100" width="140" height="185" opacity="0.5" rx="3"/>
    <!-- Door ridges -->
    <rect x="-370" y="-70"  width="140" height="8"  opacity="0.4"/>
    <rect x="-370" y="-40"  width="140" height="8"  opacity="0.4"/>
    <rect x="-370" y="-10"  width="140" height="8"  opacity="0.4"/>
    <rect x="-370" y="20"   width="140" height="8"  opacity="0.4"/>
    <rect x="-200" y="-70"  width="140" height="8"  opacity="0.4"/>
    <rect x="-200" y="-40"  width="140" height="8"  opacity="0.4"/>
    <rect x="-200" y="-10"  width="140" height="8"  opacity="0.4"/>
    <rect x="-200" y="20"   width="140" height="8"  opacity="0.4"/>
    <rect x="60"   y="-70"  width="140" height="8"  opacity="0.4"/>
    <rect x="60"   y="-40"  width="140" height="8"  opacity="0.4"/>
    <rect x="60"   y="-10"  width="140" height="8"  opacity="0.4"/>
    <rect x="60"   y="20"   width="140" height="8"  opacity="0.4"/>
    <rect x="230"  y="-70"  width="140" height="8"  opacity="0.4"/>
    <rect x="230"  y="-40"  width="140" height="8"  opacity="0.4"/>
    <rect x="230"  y="-10"  width="140" height="8"  opacity="0.4"/>
    <rect x="230"  y="20"   width="140" height="8"  opacity="0.4"/>
    <!-- Loading dock -->
    <rect x="-400" y="90"  width="800" height="14" rx="3" opacity="0.4"/>
    <!-- Forklift dock -->
    <rect x="-390" y="90"  width="40"  height="80" rx="3" opacity="0.3"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Warehouse / Storage</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Commercial · Industrial</text>
</svg>
