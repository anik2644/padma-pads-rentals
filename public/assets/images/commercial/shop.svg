<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="220" cy="200" r="360" fill="white" opacity="0.06"/>
  <circle cx="980" cy="700" r="300" fill="white" opacity="0.06"/>
  <!-- Retail shop / storefront -->
  <g fill="white" opacity="0.18" transform="translate(600,460)">
    <!-- Main building -->
    <rect x="-300" y="-260" width="600" height="340" rx="6"/>
    <!-- Large shop front glass -->
    <rect x="-270" y="-220" width="540" height="160" opacity="0.5" rx="3"/>
    <!-- Display items in window (simplified) -->
    <rect x="-250" y="-205" width="70" height="130" opacity="0.4"/>
    <rect x="-160" y="-205" width="70" height="130" opacity="0.4"/>
    <rect x="-70"  y="-205" width="70" height="130" opacity="0.4"/>
    <rect x="20"   y="-205" width="70" height="130" opacity="0.4"/>
    <rect x="110"  y="-205" width="70" height="130" opacity="0.4"/>
    <rect x="200"  y="-205" width="70" height="130" opacity="0.4"/>
    <!-- Awning -->
    <rect x="-310" y="-275" width="620" height="25" rx="4" opacity="0.7"/>
    <!-- Entrance door (centre) -->
    <rect x="-50" y="-40" width="100" height="120"/>
    <!-- Door handle -->
    <rect x="-8"  y="30"  width="16" height="8" rx="4" opacity="0.8"/>
    <!-- Sign board -->
    <rect x="-140" y="-310" width="280" height="40" rx="8" opacity="0.5"/>
    <!-- Steps -->
    <rect x="-280" y="78"  width="560" height="14" rx="4" opacity="0.4"/>
    <rect x="-300" y="90"  width="600" height="12" rx="4" opacity="0.3"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Shop / Retail</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Commercial · Retail Space</text>
</svg>
