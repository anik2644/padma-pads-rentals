<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="180" cy="160" r="340" fill="white" opacity="0.06"/>
  <circle cx="1060" cy="740" r="300" fill="white" opacity="0.06"/>
  <!-- Wide showroom with glass facade -->
  <g fill="white" opacity="0.18" transform="translate(600,460)">
    <!-- Main wide building (low-rise) -->
    <rect x="-380" y="-200" width="760" height="280" rx="5"/>
    <!-- Large glass facade sections -->
    <rect x="-360" y="-180" width="230" height="180" opacity="0.5" rx="3"/>
    <rect x="-110" y="-180" width="220" height="180" opacity="0.5" rx="3"/>
    <rect x="130"  y="-180" width="230" height="180" opacity="0.5" rx="3"/>
    <!-- Vertical dividers -->
    <rect x="-120" y="-185" width="12" height="185" opacity="0.6"/>
    <rect x="120"  y="-185" width="12" height="185" opacity="0.6"/>
    <!-- Roof parapet -->
    <rect x="-395" y="-215" width="790" height="20" rx="5" opacity="0.6"/>
    <!-- Entrance canopy -->
    <rect x="-80"  y="-220" width="160" height="12" rx="4" opacity="0.8"/>
    <!-- Main door -->
    <rect x="-55"  y="0"    width="110" height="80"/>
    <!-- Brand signage zone -->
    <rect x="-200" y="-270" width="400" height="55" rx="8" opacity="0.4"/>
    <!-- Parking area outline -->
    <rect x="-380" y="80"   width="760" height="14" rx="4" opacity="0.3"/>
    <line x1="-270" y1="80" x2="-270" y2="94" stroke="white" stroke-width="4" opacity="0.3"/>
    <line x1="-160" y1="80" x2="-160" y2="94" stroke="white" stroke-width="4" opacity="0.3"/>
    <line x1="-50"  y1="80" x2="-50"  y2="94" stroke="white" stroke-width="4" opacity="0.3"/>
    <line x1="60"   y1="80" x2="60"   y2="94" stroke="white" stroke-width="4" opacity="0.3"/>
    <line x1="170"  y1="80" x2="170"  y2="94" stroke="white" stroke-width="4" opacity="0.3"/>
    <line x1="280"  y1="80" x2="280"  y2="94" stroke="white" stroke-width="4" opacity="0.3"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Showroom</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Commercial · Display Space</text>
</svg>
