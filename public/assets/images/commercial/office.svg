<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="250" cy="180" r="390" fill="white" opacity="0.06"/>
  <circle cx="1000" cy="720" r="310" fill="white" opacity="0.06"/>
  <!-- Modern glass office tower -->
  <g fill="white" opacity="0.18" transform="translate(600,450)">
    <!-- Main tower -->
    <rect x="-150" y="-400" width="300" height="510" rx="6"/>
    <!-- Glass curtain wall lines -->
    <rect x="-150" y="-400" width="300" height="14" opacity="0.4"/>
    <rect x="-150" y="-356" width="300" height="14" opacity="0.4"/>
    <rect x="-150" y="-312" width="300" height="14" opacity="0.4"/>
    <rect x="-150" y="-268" width="300" height="14" opacity="0.4"/>
    <rect x="-150" y="-224" width="300" height="14" opacity="0.4"/>
    <rect x="-150" y="-180" width="300" height="14" opacity="0.4"/>
    <rect x="-150" y="-136" width="300" height="14" opacity="0.4"/>
    <rect x="-150" y="-92"  width="300" height="14" opacity="0.4"/>
    <rect x="-150" y="-48"  width="300" height="14" opacity="0.4"/>
    <!-- Vertical dividers -->
    <rect x="-62" y="-400" width="12" height="510" opacity="0.3"/>
    <rect x="50"  y="-400" width="12" height="510" opacity="0.3"/>
    <!-- Lobby -->
    <rect x="-140" y="48" width="280" height="62" opacity="0.7"/>
    <rect x="-90"  y="48" width="80"  height="62" opacity="0.5"/>
    <rect x="10"   y="48" width="80"  height="62" opacity="0.5"/>
    <!-- Roof detail -->
    <rect x="-165" y="-415" width="330" height="18" rx="5" opacity="0.5"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Office Space</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Commercial · Professional</text>
</svg>
