<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="200" cy="180" r="370" fill="white" opacity="0.06"/>
  <circle cx="1030" cy="730" r="300" fill="white" opacity="0.07"/>
  <!-- Hotel tower with podium -->
  <g fill="white" opacity="0.18" transform="translate(600,450)">
    <!-- Podium base -->
    <rect x="-300" y="-80" width="600" height="190" rx="5"/>
    <!-- Tower -->
    <rect x="-130" y="-420" width="260" height="345" rx="6"/>
    <!-- Tower windows -->
    <rect x="-95" y="-380" width="55" height="45" opacity="0.6"/>
    <rect x="-20" y="-380" width="55" height="45" opacity="0.6"/>
    <rect x="55"  y="-380" width="55" height="45" opacity="0.6"/>
    <rect x="-95" y="-315" width="55" height="45" opacity="0.6"/>
    <rect x="-20" y="-315" width="55" height="45" opacity="0.6"/>
    <rect x="55"  y="-315" width="55" height="45" opacity="0.6"/>
    <rect x="-95" y="-250" width="55" height="45" opacity="0.6"/>
    <rect x="-20" y="-250" width="55" height="45" opacity="0.6"/>
    <rect x="55"  y="-250" width="55" height="45" opacity="0.6"/>
    <rect x="-95" y="-185" width="55" height="45" opacity="0.6"/>
    <rect x="-20" y="-185" width="55" height="45" opacity="0.6"/>
    <rect x="55"  y="-185" width="55" height="45" opacity="0.6"/>
    <!-- Podium windows -->
    <rect x="-270" y="-50" width="100" height="80" opacity="0.5"/>
    <rect x="-145" y="-50" width="100" height="80" opacity="0.5"/>
    <rect x="45"   y="-50" width="100" height="80" opacity="0.5"/>
    <rect x="170"  y="-50" width="100" height="80" opacity="0.5"/>
    <!-- Grand entrance -->
    <rect x="-65" y="-60" width="130" height="170"/>
    <!-- Canopy -->
    <rect x="-110" y="-70" width="220" height="16" rx="4" opacity="0.6"/>
    <!-- Pool area (to the side) -->
    <rect x="-390" y="10" width="85" height="100" rx="8" opacity="0.3"/>
    <rect x="305"  y="10" width="85" height="100" rx="8" opacity="0.3"/>
    <!-- Roof top -->
    <rect x="-145" y="-435" width="290" height="18" rx="5" opacity="0.5"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Hotel</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Recreational · Hospitality</text>
</svg>
