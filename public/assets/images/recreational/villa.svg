<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="210" cy="170" r="360" fill="white" opacity="0.07"/>
  <circle cx="1010" cy="730" r="310" fill="white" opacity="0.06"/>
  <!-- Luxury villa with flat roof and terrace -->
  <g fill="white" opacity="0.18" transform="translate(600,460)">
    <!-- Main villa body (modern flat roof style) -->
    <rect x="-280" y="-200" width="560" height="300" rx="6"/>
    <!-- Upper level (smaller) -->
    <rect x="-160" y="-330" width="320" height="135" rx="5"/>
    <!-- Roof terrace railing -->
    <rect x="-165" y="-340" width="330" height="16" rx="4" opacity="0.5"/>
    <rect x="-285" y="-210" width="570" height="14" rx="4" opacity="0.5"/>
    <!-- Columns / pillars -->
    <rect x="-240" y="-195" width="22" height="290" opacity="0.4"/>
    <rect x="-100" y="-195" width="22" height="290" opacity="0.4"/>
    <rect x="78"   y="-195" width="22" height="290" opacity="0.4"/>
    <rect x="218"  y="-195" width="22" height="290" opacity="0.4"/>
    <!-- Large windows -->
    <rect x="-220" y="-160" width="100" height="140" opacity="0.6" rx="3"/>
    <rect x="-60"  y="-160" width="120" height="140" opacity="0.6" rx="3"/>
    <rect x="100"  y="-160" width="100" height="140" opacity="0.6" rx="3"/>
    <!-- Upper level windows -->
    <rect x="-130" y="-310" width="90" height="80"  opacity="0.6" rx="3"/>
    <rect x="40"   y="-310" width="90" height="80"  opacity="0.6" rx="3"/>
    <!-- Main door (double) -->
    <rect x="-45"  y="-20"  width="90" height="120"/>
    <!-- Pool in front -->
    <rect x="-220" y="110"  width="440" height="80" rx="10" opacity="0.3" fill="none" stroke="white" stroke-width="6"/>
    <!-- Driveway -->
    <rect x="-50"  y="190"  width="100" height="180" opacity="0.15"/>
    <!-- Garden circles (trees) -->
    <circle cx="-330" cy="80"  r="42" opacity="0.25"/>
    <circle cx="330"  cy="80"  r="42" opacity="0.25"/>
    <circle cx="-320" cy="40"  r="30" opacity="0.2"/>
    <circle cx="320"  cy="40"  r="30" opacity="0.2"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Villa</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Recreational · Luxury Stay</text>
</svg>
