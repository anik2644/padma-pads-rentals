<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="200" cy="160" r="360" fill="white" opacity="0.06"/>
  <circle cx="1000" cy="720" r="300" fill="white" opacity="0.06"/>
  <!-- Resort complex with multiple buildings and pool -->
  <g fill="white" opacity="0.18" transform="translate(600,460)">
    <!-- Central main building -->
    <rect x="-160" y="-260" width="320" height="340" rx="6"/>
    <!-- Left bungalow -->
    <rect x="-390" y="-160" width="200" height="220" rx="5"/>
    <polygon points="-390,-160 -290,-250 -190,-160" opacity="0.9"/>
    <!-- Right bungalow -->
    <rect x="190"  y="-160" width="200" height="220" rx="5"/>
    <polygon points="190,-160 290,-250 390,-160" opacity="0.9"/>
    <!-- Pool (blue overlay) -->
    <rect x="-120" y="80"   width="240" height="100" rx="12" fill="url(#water)" opacity="1"/>
    <!-- Pool edge -->
    <rect x="-130" y="75"   width="260" height="12" rx="6" opacity="0.4"/>
    <!-- Main building windows -->
    <rect x="-115" y="-220" width="70" height="60" opacity="0.6"/>
    <rect x="-20"  y="-220" width="70" height="60" opacity="0.6"/>
    <rect x="75"   y="-220" width="70" height="60" opacity="0.6"/>
    <rect x="-115" y="-135" width="70" height="60" opacity="0.6"/>
    <rect x="75"   y="-135" width="70" height="60" opacity="0.6"/>
    <!-- Grand door -->
    <rect x="-40"  y="-40"  width="80" height="120"/>
    <!-- Canopy -->
    <rect x="-80"  y="-48"  width="160" height="14" rx="4" opacity="0.5"/>
    <!-- Palm tree suggestion (circles) -->
    <circle cx="-440" cy="-50" r="30" opacity="0.35"/>
    <circle cx="-430" cy="-80" r="25" opacity="0.35"/>
    <rect x="-446" cy="0" width="12" height="80" rx="4" opacity="0.3"/>
    <circle cx="450" cy="-50" r="30" opacity="0.35"/>
    <circle cx="440" cy="-80" r="25" opacity="0.35"/>
    <rect x="434" cy="0" width="12" height="80" rx="4" opacity="0.3"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Resort</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Recreational · Leisure &amp; Relaxation</text>
</svg>
