<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="220" cy="180" r="380" fill="white" opacity="0.06"/>
  <circle cx="1020" cy="740" r="310" fill="white" opacity="0.06"/>
  <!-- Hostel / long building silhouette -->
  <g fill="white" opacity="0.18" transform="translate(600,450)">
    <rect x="-340" y="-200" width="680" height="290" rx="6"/>
    <rect x="-290" y="-150" width="50" height="45" opacity="0.6"/>
    <rect x="-210" y="-150" width="50" height="45" opacity="0.6"/>
    <rect x="-130" y="-150" width="50" height="45" opacity="0.6"/>
    <rect x="-50"  y="-150" width="50" height="45" opacity="0.6"/>
    <rect x="30"   y="-150" width="50" height="45" opacity="0.6"/>
    <rect x="110"  y="-150" width="50" height="45" opacity="0.6"/>
    <rect x="190"  y="-150" width="50" height="45" opacity="0.6"/>
    <rect x="-290" y="-70"  width="50" height="45" opacity="0.6"/>
    <rect x="-210" y="-70"  width="50" height="45" opacity="0.6"/>
    <rect x="-130" y="-70"  width="50" height="45" opacity="0.6"/>
    <rect x="-50"  y="-70"  width="50" height="45" opacity="0.6"/>
    <rect x="30"   y="-70"  width="50" height="45" opacity="0.6"/>
    <rect x="110"  y="-70"  width="50" height="45" opacity="0.6"/>
    <rect x="190"  y="-70"  width="50" height="45" opacity="0.6"/>
    <!-- Door -->
    <rect x="-35" y="30" width="70" height="60" opacity="0.8"/>
    <!-- Roof line -->
    <rect x="-340" y="-220" width="680" height="20" rx="4"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Hostel / Mess</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Residential · Student &amp; Bachelor</text>
