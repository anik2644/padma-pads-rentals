<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="180" cy="150" r="360" fill="white" opacity="0.06"/>
  <circle cx="1050" cy="760" r="300" fill="white" opacity="0.06"/>
  <!-- Two adjoined units -->
  <g fill="white" opacity="0.18" transform="translate(600,450)">
    <!-- Left unit -->
    <polygon points="-300,-120 -100,-280 100,-120" opacity="0.9"/>
    <rect x="-290" y="-120" width="380" height="230" rx="4"/>
    <!-- Right unit -->
    <polygon points="-20,-100 180,-240 380,-100" opacity="0.9"/>
    <rect x="-10" y="-100" width="370" height="210" rx="4"/>
    <!-- Windows left -->
    <rect x="-240" y="-60" width="70" height="65" opacity="0.6"/>
    <rect x="-140" y="-60" width="70" height="65" opacity="0.6"/>
    <!-- Windows right -->
    <rect x="40"  y="-50"  width="70" height="60" opacity="0.6"/>
    <rect x="140" y="-50"  width="70" height="60" opacity="0.6"/>
    <!-- Doors -->
    <rect x="-65" y="50" width="60" height="60"/>
    <rect x="135" y="50" width="60" height="60"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Shared Room</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Residential · Student</text>
</svg>
