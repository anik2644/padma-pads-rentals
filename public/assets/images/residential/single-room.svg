<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="150" cy="120" r="320" fill="white" opacity="0.06"/>
  <circle cx="1100" cy="800" r="280" fill="white" opacity="0.07"/>
  <!-- House with pitched roof -->
  <g fill="white" opacity="0.18" transform="translate(600,460)">
    <!-- Roof -->
    <polygon points="-210,-180 0,-360 210,-180" opacity="0.9"/>
    <!-- Chimney -->
    <rect x="90" y="-360" width="45" height="110" opacity="0.9"/>
    <!-- Walls -->
    <rect x="-200" y="-180" width="400" height="290" rx="4"/>
    <!-- Door -->
    <rect x="-45" y="40" width="90" height="70"/>
    <!-- Windows -->
    <rect x="-155" y="-120" width="90" height="80" opacity="0.6"/>
    <rect x="65"   y="-120" width="90" height="80" opacity="0.6"/>
    <!-- Ground -->
    <rect x="-260" y="108" width="520" height="14" rx="7" opacity="0.4"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Single Room</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Residential · Bachelor &amp; Student</text>
</svg>
