<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="dim" x1="0" y1="0.4" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.68"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="250" cy="200" r="400" fill="white" opacity="0.06"/>
  <circle cx="950" cy="700" r="320" fill="white" opacity="0.06"/>
  <!-- Town house / row house -->
  <g fill="white" opacity="0.18" transform="translate(600,450)">
    <polygon points="-250,-160 -60,-310 130,-160" opacity="0.9"/>
    <rect x="-240" y="-160" width="370" height="270" rx="4"/>
    <!-- Balcony -->
    <rect x="-80" y="-80" width="140" height="15" opacity="0.7"/>
    <rect x="-80" y="-80" width="10" height="80" opacity="0.5"/>
    <rect x="130" y="-80" width="10" height="80" opacity="0.5"/>
    <!-- Windows -->
    <rect x="-195" y="-120" width="75" height="65" opacity="0.6"/>
    <rect x="-55"  y="-120" width="75" height="65" opacity="0.6"/>
    <rect x="85"   y="-120" width="75" height="65" opacity="0.6"/>
    <!-- Door -->
    <rect x="-35" y="40" width="70" height="70"/>
    <!-- Steps -->
    <rect x="-50" y="106" width="100" height="12" rx="4" opacity="0.5"/>
    <rect x="-65" y="116" width="130" height="10" rx="4" opacity="0.4"/>
  </g>
  <rect width="1200" height="900" fill="url(#dim)"/>
  <text x="80" y="814" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="60" font-weight="700" opacity="0.95">Sublet</text>
  <text x="80" y="878" fill="white" font-family="Inter,ui-sans-serif,sans-serif" font-size="38" opacity="0.7">Residential · Bachelor &amp; Family</text>
</svg>
